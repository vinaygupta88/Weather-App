<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Weather App</title>
    <link rel="icon" href="title.png"  type="image/x-icon">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

</head>

<body>

    <!-- HEADER -->
    <header>
        <h1><img src="title.png" height="30px" alt=""> Weather Web App</h1>

        <button id="themeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>
    </header>

    <!-- MAIN -->
    <main>

        <!-- SEARCH SECTION -->
        <section class="search-section">

            <form id="weatherForm">

                <input type="text" id="cityInput" placeholder="Enter city name..." required>

                <button type="submit">
                    Search
                </button>

            </form>

        </section>

        <!-- WEATHER CARD -->
        <section class="weather-container">

            <div class="weather-card">

                <div class="top">

                    <h2 id="city">Delhi</h2>

                    <p id="country">India</p>

                    <h3 id="temp">25°C</h3>

                    <img id="weatherIcon" src="" alt="weather icon">

                    <p id="condition">Cloudy</p>

                </div>

                <hr>

                <div class="details">

                    <div class="detail-box">
                        <i class="fa-solid fa-water"></i>
                        <p>Humidity</p>
                        <span id="humidity">60%</span>
                    </div>

                    <div class="detail-box">
                        <i class="fa-solid fa-wind"></i>
                        <p>Wind</p>
                        <span id="wind">3 km/h</span>
                    </div>

                    <div class="detail-box">
                        <i class="fa-solid fa-temperature-high"></i>
                        <p>Feels Like</p>
                        <span id="feelsLike">27°C</span>
                    </div>

                </div>

                <div class="date-time">

                    <p id="date"></p>
                    <p id="time"></p>

                </div>
                <div id="forecastContainer"></div>
            </div>
            

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>
            © 2024 Weather App. All Rights Reserved.
        </p>

        <p>
            Developed By <span class="owner"><a href="vinaygupta88.github.io/Myportfolio/">Vinay Kumar</span></a>
        </p>
    </footer>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
